
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Vritti & Deepak — Save the Date</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Parisienne&family=Cormorant+Garamond:ital,wght@1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Pastel Green & Floral Palette */
    --blush: #E7C9C2;
    --blush-soft: #F1F6EE;
    --paper: #FCFAF3;
    --rose: #E7C9C2;
    --rose-dark: #51704A;
    --accent-gold: #A9C39B;
    --gold-light: #F6F1E4;
    --ink: #3C4436;
    --ink-soft: #7C8873;
    --shadow: 0 25px 55px rgba(60,68,54,0.15);
    /* aliases used by the envelope block */
    --bg: #F1F6EE;
    --bg-alt: #E4EEDF;
    --accent: #7C9A6E;
    --accent-light: #A9C39B;
    --accent-dark: #51704A;
    --cream-soft: #F6F1E4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--blush-soft);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }
  body.locked { overflow: hidden; height: 100vh; }

  /* ================= ENVELOPE OVERLAY ================= */
  #envelope-screen{
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(124,154,110,0.10), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(231,201,194,0.25), transparent 45%),
      var(--bg);
    transition:opacity 0.9s ease;
    cursor:pointer;
    padding:20px;
  }
  #envelope-screen.reveal{opacity:0; pointer-events:none;}

  .envelope-wrap{ perspective:1400px; }
  .envelope{
    position:relative;
    width:min(300px, 74vw);
    height:min(390px, 96vw);
  }

  .env-back{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(135deg, rgba(124,154,110,0.05) 0px, rgba(124,154,110,0.05) 1px, transparent 1px, transparent 4px),
      radial-gradient(rgba(81,112,74,0.06) 1px, transparent 1.2px),
      linear-gradient(160deg, #FCFAF3, #F1ECDA);
    background-size:auto, 5px 5px, auto;
    border:1px solid rgba(124,154,110,0.55);
    border-radius:4px;
    box-shadow:var(--shadow);
  }
  .env-back::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid rgba(124,154,110,0.35);
    pointer-events:none;
  }
  .env-back::after{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.5), transparent 65%);
    border-radius:4px;
    pointer-events:none;
    mix-blend-mode:soft-light;
  }
  .corner-sprig{
    position:absolute; width:34px; height:34px; opacity:0.85;
  }
  .corner-sprig.tl{ top:6px; left:6px; }
  .corner-sprig.tr{ top:6px; right:6px; transform:scaleX(-1); }
  .corner-sprig.bl{ bottom:6px; left:6px; transform:scaleY(-1); }
  .corner-sprig.br{ bottom:6px; right:6px; transform:scale(-1,-1); }

  .card-peek{
    position:absolute;
    left:7%; right:7%; top:6%;
    height:88%;
    background:
      radial-gradient(rgba(81,112,74,0.05) 1px, transparent 1.2px),
      var(--paper);
    background-size:5px 5px, auto;
    border:1px solid var(--accent);
    box-shadow:0 10px 24px rgba(60,68,54,0.18);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
    overflow:hidden;
    transform:translateY(6%);
    transition:transform 0.7s cubic-bezier(.2,.8,.2,1);
    z-index:2;
    text-align:center;
  }
  .card-peek::before{
    content:"";
    position:absolute; inset:9px;
    border:1px solid var(--accent-light);
    pointer-events:none;
  }
  .card-peek .monogram{
    font-family:'Playfair Display', serif;
    font-size:1.4rem;
    font-weight:600;
    color:var(--accent-dark);
    letter-spacing:0.08em;
    opacity:0;
    transition:opacity 0.5s ease;
  }
  .card-peek span.small{
    font-size:0.62rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--ink-soft);
    opacity:0;
    transition:opacity 0.5s ease;
  }
  .envelope.peek .card-peek{ transform:translateY(-52%); }
  .envelope.peek .card-peek .monogram,
  .envelope.peek .card-peek span.small{
    opacity:1;
    transition:opacity 0.6s ease 0.35s;
  }

  .flap{
    position:absolute;
    top:0; left:0; right:0;
    height:46%;
    background:
      repeating-linear-gradient(135deg, rgba(124,154,110,0.05) 0px, rgba(124,154,110,0.05) 1px, transparent 1px, transparent 4px),
      linear-gradient(165deg, #F6F1E4, #E9E1CB);
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    transform-origin:top center;
    transform-style:preserve-3d;
    z-index:3;
    border:1px solid rgba(124,154,110,0.55);
    border-bottom:none;
    box-shadow:inset 0 -6px 10px -6px rgba(60,68,54,0.25);
    transition:transform 0.8s cubic-bezier(.4,.1,.2,1);
  }
  .envelope.opening .flap{ transform:rotateX(178deg); }

  .front-pocket{
    position:absolute;
    left:0; right:0; bottom:0; height:56%;
    background:
      repeating-linear-gradient(135deg, rgba(124,154,110,0.05) 0px, rgba(124,154,110,0.05) 1px, transparent 1px, transparent 4px),
      linear-gradient(160deg, #FCFAF3, #F1ECDA);
    clip-path:polygon(0 100%, 0 30%, 50% 62%, 100% 30%, 100% 100%);
    z-index:4;
    border:1px solid rgba(124,154,110,0.3);
    box-shadow:inset 0 6px 10px -6px rgba(60,68,54,0.18);
  }

  .seal-wrap{
    position:absolute; z-index:6;
    left:50%; top:46%;
    width:84px; height:96px;
    transform:translate(-50%,-50%);
    filter:drop-shadow(0 6px 8px rgba(60,68,54,0.35));
  }
  .seal-half{
    position:absolute; inset:0;
    transition:transform 0.55s cubic-bezier(.4,0,.6,1), opacity 0.5s ease 0.05s;
  }
  .seal-half svg{ width:100%; height:100%; display:block; }
  .seal-half.left{ clip-path:polygon(0 0, 50% 0, 50% 100%, 0 100%); }
  .seal-half.right{ clip-path:polygon(50% 0, 100% 0, 100% 100%, 50% 100%); }
  .envelope.untying .seal-half.left{ transform:translate(-16px,10px) rotate(-18deg); opacity:0; }
  .envelope.untying .seal-half.right{ transform:translate(16px,10px) rotate(18deg); opacity:0; }

  .glow-burst{
    position:absolute; z-index:5;
    left:50%; top:46%; width:10px; height:10px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(169,195,155,0.85), rgba(169,195,155,0) 70%);
    opacity:0;
  }
  .envelope.untying .glow-burst{
    animation:burst 0.6s ease-out forwards;
  }
  @keyframes burst{
    0%{ width:10px; height:10px; opacity:0.9; }
    100%{ width:220px; height:220px; opacity:0; }
  }

  .tap-hint{
    margin-top:26px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.15rem;
    color:var(--accent-dark);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
  .to-line{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:2rem;
    color:var(--ink-soft);
    margin-bottom:18px;
    letter-spacing:0.03em;
    text-align:center;
  }

  /* ================= MAIN SITE CONTENT ================= */
  #site-content { position: relative; z-index: 1; }

  #music-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 40;
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(124,154,110,0.4); background: var(--paper);
    color: var(--rose-dark); box-shadow: var(--shadow); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: transform .2s ease;
  }
  #music-toggle:hover { transform: scale(1.08); }
  #music-toggle.spinning svg { animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- HERO SECTION ---------- */
  .hero {
    min-height: 90vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 24px 20px;
    position: relative;
    overflow: hidden; /* For particles */
    background: 
      radial-gradient(circle at top left, #F6FAF3, transparent 40%),
      radial-gradient(circle at bottom right, #E9F1E4, transparent 40%);
  }

  /* Make sure text content sits above the particles */
  .hero-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
	margin-top: -20px; /* Force it higher */
  }
  
  /* Hide elements initially */
  .hero-content > * {
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .hero.animate-in .hero-content > * { opacity: 1; transform: translateY(0); }

  /* Cascading delay */
  .hero.animate-in .eyebrow { transition-delay: 0.6s; }
  .hero.animate-in h1 { transition-delay: 2.0s; }
  .hero.animate-in .tagline { transition-delay: 4.0s; }
  .hero.animate-in .date { transition-delay: 6.8s; }

  /* Refined "Save the Date" Styling */
  .hero .eyebrow { 
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 1.6rem;
    color: var(--rose-dark);
    font-weight: 400;
    margin-bottom: 28px;
    position: relative;
  }
  .hero .eyebrow::after {
    content: '';
    display: block;
    width: 45px;
    height: 1px;
    background: var(--accent-gold);
    margin: 14px auto 0;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: clamp(3.4rem, 10vw, 4.8rem);
    color: var(--ink);
    line-height: 1.1;
  }
  /*.hero h1 .amp { color: var(--accent-gold); font-family: 'Parisienne', cursive; font-size: 1.1em; padding: 0 0.1em; }*/
	.hero h1 .amp{ color:var(--accent-gold); font-style:italic; padding:0 0.15em; }
  .hero .tagline {
    font-family: 'Parisienne', cursive;
    font-size: clamp(1.4rem, 4.5vw, 2rem);
    color: var(--rose-dark);
    margin: 18px 0 26px;
  } 
  .hero .date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.2rem);
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  /* ---------- GLITTER & PETAL PARTICLES ---------- */
  #particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    top: -20px;
    opacity: 0;
    animation: fall linear forwards;
  }
  /* Delicate Sage Glitter */
  .particle.glitter {
    width: 5px; height: 5px;
    background: var(--accent-gold);
    border-radius: 50%;
    box-shadow: 0 0 6px 1px rgba(169,195,155,0.7);
  }
  /* Soft Blush Petal */
  .particle.petal {
    width: 14px; height: 14px;
    background: var(--rose);
    border-radius: 50% 0 50% 0; /* Petal shape */
    opacity: 0.5;
  }

  @keyframes fall {
    0% { transform: translateY(-5vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(105vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  footer {
    padding: 60px 24px 40px; text-align: center;
    color: var(--ink-soft); font-size: 0.88rem; letter-spacing: 0.05em;
  }
  footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--rose-dark); }
  footer .credit { margin-top: 12px; font-family: 'Jost', sans-serif; font-size: 0.72rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>

<script>
  const envelope = document.getElementById('envelope');
  const envelopeScreen = document.getElementById('envelope-screen');
  const bgm = document.getElementById('bgm');
  const musicToggle = document.getElementById('music-toggle');
  const body = document.body;
  let opened = false;

// --- ADD THE USER GESTURE FIX HERE ---
  document.body.addEventListener('click', () => {
    if (bgm.paused) {
        bgm.play().catch(() => {});
    }
  }, { once: true });
  
  // Particle Generation Function
  function startFlowerShower() {
    const particleContainer = document.getElementById('particles');
    const totalParticles = 45; // Number of particles on screen
    
    for (let i = 0; i < totalParticles; i++) {
      setTimeout(() => {
        createParticle(particleContainer);
      }, Math.random() * 5000); // Stagger initial spawn over 5 seconds
    }
  }

  function createParticle(container) {
    const particle = document.createElement('div');
    // 60% chance for a petal, 40% chance for glitter
    const isPetal = Math.random() > 0.4;
    particle.className = isPetal ? 'particle petal' : 'particle glitter';
    
    // Randomize starting position horizontally
    particle.style.left = Math.random() * 100 + 'vw';
    
    // Randomize duration (falling speed) between 6s and 12s
    const duration = Math.random() * 6 + 6;
    particle.style.animationDuration = duration + 's';
    
    container.appendChild(particle);
    
    // When animation ends, remove it and create a new one to keep it endless
    setTimeout(() => {
      particle.remove();
      if (!body.classList.contains('locked')) { // Keep generating if page is open
        createParticle(container);
      }
    }, duration * 1000);
  }

  envelopeScreen.addEventListener('click', () => {
    if (opened) return;
    opened = true;

    envelope.classList.add('untying');
    setTimeout(() => envelope.classList.add('opening'), 500);
    setTimeout(() => envelope.classList.add('peek'), 1200);
    
    // Fade out envelope and trigger the hero animations
    setTimeout(() => {
      envelopeScreen.classList.add('reveal');
      body.classList.remove('locked');
      
      // Trigger the cascading text animation
      document.querySelector('.hero').classList.add('animate-in');
      
      // Start the glitter & flower shower
      startFlowerShower();
      
      bgm.volume = 0.5;
      bgm.play().catch(() => {});
      musicToggle.classList.add('spinning');
    }, 1850);
    
    setTimeout(() => { envelopeScreen.style.display = 'none'; }, 2850);
  });

  musicToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (bgm.paused) {
      bgm.play().catch(() => {});
      musicToggle.classList.add('spinning');
    } else {
      bgm.pause();
      musicToggle.classList.remove('spinning');
    }
  });

  // Safe check for RSVP form in case you add it back later
  const rsvpForm = document.getElementById('rsvp-form');
  if (rsvpForm) {
    rsvpForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById('rsvp-message');
      const data = new FormData(form);
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          msg.textContent = 'Thank you — your RSVP has been received with love!';
        } else {
          msg.textContent = 'Hmm, something went wrong. Please try again or reach out to us directly.';
        }
      } catch (err) {
        msg.textContent = 'Hmm, something went wrong. Please try again or reach out to us directly.';
      }
      msg.style.display = 'block';
      form.reset();
    });
  }
</script>
</body>
</html>
